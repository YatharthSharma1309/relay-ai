name: E2E Smoke Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: supportai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/supportai_test?sslmode=disable
      AUTH_BYPASS: "true"
      NEXT_PUBLIC_AUTH_BYPASS: "true"
      E2E_AUTH_BYPASS: "true"
      DEMO_WIDGET_KEY: wk_test_e2e_demo_widget_key
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      APP_URL: http://localhost:3000
      PLAYWRIGHT_DASHBOARD: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed demo organization
        run: npm run db:seed

      - name: Build production app
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
